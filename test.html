"kpoints_scf"}, {"name": "code"}, {"name": "structure"}, {"name": "kpoints_bands"}], "position": [30, 30], "children": []}, "graph_outputs": {"identifier": "graph_outputs", "label": "graph_outputs", "node_type": "NORMAL", "inputs": [{"name": "scf_parameters", "identifier": "workgraph.dict"}, {"name": "band_structure", "identifier": "workgraph.annotated"}, {"name": "scf_parameters"}, {"name": "band_structure"}], "properties": {"scf_parameters": {"identifier": "workgraph.dict", "value": null}, "band_structure": {"identifier": "workgraph.any", "value": null}}, "outputs": [], "position": [30, 30], "children": []}, "PwBaseWorkChain": {"identifier": "PwBaseWorkChain", "label": "PwBaseWorkChain", "node_type": "WORKCHAIN", "inputs": [{"name": "pw", "identifier": "workgraph.namespace"}, {"name": "pw.code"}, {"name": "pw.structure"}, {"name": "pw.parameters"}, {"name": "kpoints"}], "properties": {"max_iterations": {"identifier": "workgraph.int", "value": null}, "clean_workdir": {"identifier": "workgraph.bool", "value": true}, "handler_overrides": {"identifier": "workgraph.any", "value": null}, "kpoints": {"identifier": "workgraph.any", "value": null}, "kpoints_distance": {"identifier": "workgraph.any", "value": null}, "kpoints_force_parity": {"identifier": "workgraph.any", "value": null}, "_wait": {"identifier": "workgraph.any", "value": null}}, "outputs": [{"name": "output_parameters"}, {"name": "remote_folder"}, {"name": "output_parameters"}], "position": [30, 30], "children": []}, "prepare_bands_parameters": {"identifier": "prepare_bands_parameters", "label": "prepare_bands_parameters", "node_type": "CALCFUNCTION", "inputs": [{"name": "scf_parameters", "identifier": "workgraph.dict"}, {"name": "scf_parameters"}], "properties": {"scf_parameters": {"identifier": "workgraph.dict", "value": null}, "_wait": {"identifier": "workgraph.any", "value": null}}, "outputs": [{"name": "result"}], "position": [30, 30], "children": []}, "PwBaseWorkChain1": {"identifier": "PwBaseWorkChain", "label": "PwBaseWorkChain1", "node_type": "WORKCHAIN", "inputs": [{"name": "pw", "identifier": "workgraph.namespace"}, {"name": "pw.code"}, {"name": "pw.structure"}, {"name": "pw.parameters"}, {"name": "pw.parent_folder"}, {"name": "kpoints"}], "properties": {"max_iterations": {"identifier": "workgraph.int", "value": null}, "clean_workdir": {"identifier": "workgraph.bool", "value": true}, "handler_overrides": {"identifier": "workgraph.any", "value": null}, "kpoints": {"identifier": "workgraph.any", "value": null}, "kpoints_distance": {"identifier": "workgraph.any", "value": null}, "kpoints_force_parity": {"identifier": "workgraph.any", "value": null}, "_wait": {"identifier": "workgraph.any", "value": null}}, "outputs": [{"name": "output_band"}], "position": [30, 30], "children": []}}, "links": [{"from_node": "graph_inputs", "to_node": "PwBaseWorkChain", "from_socket": "code", "to_socket": "pw.code"}, {"from_node": "graph_inputs", "to_node": "PwBaseWorkChain", "from_socket": "structure", "to_socket": "pw.structure"}, {"from_node": "graph_inputs", "to_node": "PwBaseWorkChain", "from_socket": "parameters", "to_socket": "pw.parameters"}, {"from_node": "graph_inputs", "to_node": "PwBaseWorkChain", "from_socket": "kpoints_scf", "to_socket": "kpoints"}, {"from_node": "PwBaseWorkChain", "to_node": "prepare_bands_parameters", "from_socket": "output_parameters", "to_socket": "scf_parameters"}, {"from_node": "graph_inputs", "to_node": "PwBaseWorkChain1", "from_socket": "code", "to_socket": "pw.code"}, {"from_node": "graph_inputs", "to_node": "PwBaseWorkChain1", "from_socket": "structure", "to_socket": "pw.structure"}, {"from_node": "prepare_bands_parameters", "to_node": "PwBaseWorkChain1", "from_socket": "result", "to_socket": "pw.parameters"}, {"from_node": "PwBaseWorkChain", "to_node": "PwBaseWorkChain1", "from_socket": "remote_folder", "to_socket": "pw.parent_folder"}, {"from_node": "graph_inputs", "to_node": "PwBaseWorkChain1", "from_socket": "kpoints_bands", "to_socket": "kpoints"}, {"from_node": "PwBaseWorkChain", "to_node": "graph_outputs", "from_socket": "output_parameters", "to_socket": "scf_parameters"}, {"from_node": "PwBaseWorkChain1", "to_node": "graph_outputs", "from_socket": "output_band", "to_socket": "band_structure"}]}

        // Define Schemes to use in vanilla JS
        const Schemes = {
            Node: ClassicPreset.Node,
            Connection: ClassicPreset.Connection
        };

        class Node extends ClassicPreset.Node {
          width = 180;
          height = 100;
        }
        class Connection extends ClassicPreset.Connection {}

        function createDynamicNode(nodeData) {
          const node = new Node(nodeData.label);
          // resize the node based on the max length of the input/output names
          let maxSocketNameLength = 0;
          nodeData.inputs.forEach((input) => {
            let socket = new ClassicPreset.Socket(input.name);
            if (!node.inputs.hasOwnProperty(input.name)) {
              node.addInput(input.name, new ClassicPreset.Input(socket, input.name));
              maxSocketNameLength = Math.max(maxSocketNameLength, input.name.length);
            }
          });

          nodeData.outputs.forEach((output) => {
            let socket = new ClassicPreset.Socket(output.name);
            if (!node.outputs.hasOwnProperty(output.name)) {
              node.addOutput(output.name, new ClassicPreset.Output(socket, output.name));
              maxSocketNameLength = Math.max(maxSocketNameLength, output.name.length);
            }
          });
          node.height = Math.max(140, node.height + (nodeData.inputs.length + nodeData.outputs.length) * 35)
          node.width += maxSocketNameLength * 5;

          return node;
        }


        async function addNode(editor, area, nodeData) {
          console.log("Adding node", nodeData);
          const node = createDynamicNode(nodeData);
          await editor.addNode(node);
          editor.nodeMap[nodeData.label] = node; // Assuming each nodeData has a unique ID
          await area.translate(node.id, { x: nodeData.position[0], y: nodeData.position[1] });
        }

        async function addLink(editor, area, layout, linkData) {
          const fromNode = editor.nodeMap[linkData.from_node];
          const toNode = editor.nodeMap[linkData.to_node];
          console.log("fromNode", fromNode, "toNode", toNode);
          let socket;
          if (fromNode && toNode) {
            socket = new ClassicPreset.Socket(linkData.from_socket);
            if (!fromNode.outputs.hasOwnProperty(linkData.from_socket)) {
              fromNode.addOutput(linkData.from_socket, new ClassicPreset.Output(socket, linkData.from_socket));
              fromNode.height += 25; // Increase height of node for each output
              area.update('node', fromNode.id);
            }
            socket = new ClassicPreset.Socket(linkData.to_socket);
            if (!toNode.inputs.hasOwnProperty(linkData.to_socket)) {
              toNode.addInput(linkData.to_socket, new ClassicPreset.Input(socket, linkData.to_socket));
              toNode.height += 25; // Increase height of node for each input
              area.update('node', toNode.id);
            }
            await editor.addConnection(new Connection(fromNode, linkData.from_socket, toNode, linkData.to_socket));
            // await layout(true);

          }
        }

        async function loadJSON(editor, area, layout, nodegraphData) {
          for (const nodeId in nodegraphData.nodes) {
            const nodeData = nodegraphData.nodes[nodeId];
            await addNode(editor, area, nodeData);
          }

          // Adding connections based on nodegraphData
          nodegraphData.links.forEach(async (link) => { // Specify the type of link here
            await addLink(editor, area, layout, link);
          });

          // Add while zones
          console.log("Adding while zone: ");
          for (const nodeId in nodegraphData.nodes) {
            const nodeData = nodegraphData.nodes[nodeId];
            const node_type = nodeData['node_type'];
            if (node_type === "WHILE" || node_type === "IF" || node_type === "ZONE" || node_type === "MAP") {
              // find the node
              const node = editor.nodeMap[nodeData.label];
              const children = nodeData['children'];
              // find the id of all nodes in the editor that has a label in while_zone
              for (const nodeId in children) {
                const node1 = editor.nodeMap[children[nodeId]];
                node1.parent = node.id;
              }
            }
          }
        }

        /**
        * Defines custom padding for a scope layout.
        * The padding values are used by the ScopesPlugin to avoid node overlapping with the socket of the parent node.
        */
        const customScopePadding = () => ({
          top: 80,
          left: 30,
          right: 30,
          bottom: 50
        });


        async function createEditor(container) {
            const socket = new ClassicPreset.Socket("socket");

            const editor = new NodeEditor(Schemes);
            const area = new AreaPlugin(container);
            const connection = new ConnectionPlugin();
            const render = new ReactPlugin({ createRoot });
            const scopes = new ScopesPlugin({padding: customScopePadding});
            const arrange = new AutoArrangePlugin();

            const minimap = new MinimapPlugin({
              boundViewport: true
            });

            AreaExtensions.selectableNodes(area, AreaExtensions.selector(), {
                accumulating: AreaExtensions.accumulateOnCtrl(),
            });

            render.addPreset(Presets.classic.setup());
            render.addPreset(Presets.minimap.setup({ size: 200 }));

            connection.addPreset(ConnectionPresets.classic.setup());
            scopes.addPreset(ScopesPresets.classic.setup());

            const applier = new ArrangeAppliers.TransitionApplier({
              duration: 500,
              timingFunction: (t) => t,
              async onTick() {
                await AreaExtensions.zoomAt(area, editor.getNodes());
              }
            });

            arrange.addPreset(ArrangePresets.classic.setup());


            editor.use(area);
            // area.use(connection);
            area.use(render);
            area.use(scopes);
            area.use(arrange);
            area.use(minimap);

            async function layout(animate) {
              await arrange.layout({ applier: animate ? applier : undefined });
              AreaExtensions.zoomAt(area, editor.getNodes());
            }

            // Adding nodes based on nodegraphData
            const nodeMap = {}; // To keep track of created nodes for linking
            editor.nodeMap = nodeMap;


            return {
              editor: editor,
              area: area,
              layout: layout,
              destroy: () => area.destroy()
            };
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function App() {
            const [editor, setEditor] = useState(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current && !editor) {
                    createEditor(containerRef.current).then((editor) => {
                        setEditor(editor);
                        loadJSON(editor.editor, editor.area, editor.layout, nodegraphData).then(() => {
                          // aplly layout twice to ensure all nodes are arranged
                          editor?.layout(false).then(() => editor?.layout(true));
                        });
                        window.editor = editor;
                    });
                }
                if (document.getElementById('fullscreen-btn')) {
                    document.getElementById('fullscreen-btn').addEventListener('click', toggleFullScreen);
                }
                return () => {
                    if (editor) {
                        editor.destroy();
                    }
                };
            }, [containerRef, editor]);

            return (

                <div className="App">
                    <div>
                      <button onClick={() => editor?.layout(true)}>Arrange</button>
                      <button id="fullscreen-btn">Fullscreen</button>
                    </div>
                    <div ref={containerRef} className="rete" style={{ height: "100vh", width: "100%" }}></div>
                </div>
            );
        }

        const rootElement = document.getElementById("root");
        const root = createRoot(rootElement);

        root.render(
                <App />
        );
    </script>
