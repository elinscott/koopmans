# This file configures the continuous integration (CI) system on GitHub.
# Introductory materials can be found here: https://docs.github.com/en/actions/learn-github-actions/understanding-github-actions.
# Documentation for editing this file can be found here: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: Tests

# by default, give the GITHUB_TOKEN no permissions
# See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: { }

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality
    permissions:
      # give only read-only access to the contents of the repository
      # this is the only permission this job requires, so keep it to the least privilege
      # i.e., not to issues, discussions, actions, etc.
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.13", "3.12" ]
        tox-command: [ "lint", "pyroma", "mypy" ]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Clone fork dependencies next to the checkout
        # The [tool.uv.sources] path dependencies point at sibling checkouts
        # of forks carrying features still working their way upstream. Drop
        # entries here (and the corresponding uv source) as they merge.
        run: |
          # Prefer the same-named aiida-koopmans branch when one exists, so
          # stacked cross-repo PRs test against their paired plugin branch;
          # fall back to the default branch otherwise.
          git clone --depth 1 --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2 || git clone --depth 1 https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
          git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-quantumespresso ../aiida-quantumespresso
          git clone --depth 1 https://github.com/elinscott/pydantic-espresso ../pydantic_espresso
          git init -q ../aiida-core && git -C ../aiida-core fetch --depth 1 https://github.com/aiidateam/aiida-core 9acc05b4c792bdf321a3d4a8a41db3b1146d54c6 && git -C ../aiida-core checkout -q FETCH_HEAD
      - name: "Install uv"
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: "Run command"
        run: |
          uvx -p ${{ matrix.python-version }} --with tox-uv tox -e ${{ matrix.tox-command }}

  docs:
    name: Documentation
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We only test documentation on the latest version
        # sphinx 8.0 / sphinx-rtd-theme 3.0 discontinued Python 3.9 support
        # a year early, which prompted re-thinking about this.
        python-version: [ "3.13" ]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Clone fork dependencies next to the checkout
        # The [tool.uv.sources] path dependencies point at sibling checkouts
        # of forks carrying features still working their way upstream. Drop
        # entries here (and the corresponding uv source) as they merge.
        run: |
          # Prefer the same-named aiida-koopmans branch when one exists, so
          # stacked cross-repo PRs test against their paired plugin branch;
          # fall back to the default branch otherwise.
          git clone --depth 1 --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2 || git clone --depth 1 https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
          git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-quantumespresso ../aiida-quantumespresso
          git clone --depth 1 https://github.com/elinscott/pydantic-espresso ../pydantic_espresso
          git init -q ../aiida-core && git -C ../aiida-core fetch --depth 1 https://github.com/aiidateam/aiida-core 9acc05b4c792bdf321a3d4a8a41db3b1146d54c6 && git -C ../aiida-core checkout -q FETCH_HEAD
      - name: "Install uv"
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies
        run: |
          sudo apt-get install graphviz
      - name: Lint documentation
        run: uvx -p ${{ matrix.python-version }} --with tox-uv tox -e docs-lint
      - name: Check docstring coverage
        run: uvx -p ${{ matrix.python-version }} --with tox-uv tox -e docstr-coverage
      - name: Check documentation build with Sphinx
        run: uvx -p ${{ matrix.python-version }} --with tox-uv tox -e docs-test
      - name: Lint markdown
        run: uvx -p ${{ matrix.python-version }} --with tox-uv tox -e lint-markdown

  tests:
    name: Tests
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.13", "3.12" ]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Clone fork dependencies next to the checkout
        # The [tool.uv.sources] path dependencies point at sibling checkouts
        # of forks carrying features still working their way upstream. Drop
        # entries here (and the corresponding uv source) as they merge.
        run: |
          # Prefer the same-named aiida-koopmans branch when one exists, so
          # stacked cross-repo PRs test against their paired plugin branch;
          # fall back to the default branch otherwise.
          git clone --depth 1 --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2 || git clone --depth 1 https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
          git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
          git clone --depth 1 --branch patched https://github.com/elinscott/aiida-quantumespresso ../aiida-quantumespresso
          git clone --depth 1 https://github.com/elinscott/pydantic-espresso ../pydantic_espresso
          git init -q ../aiida-core && git -C ../aiida-core fetch --depth 1 https://github.com/aiidateam/aiida-core 9acc05b4c792bdf321a3d4a8a41db3b1146d54c6 && git -C ../aiida-core checkout -q FETCH_HEAD
      - name: "Install uv"
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Test with pytest and generate coverage file
        run:
          uvx -p ${{ matrix.python-version }} --with tox-uv tox -e py
      - name: Run doctests
        run:
          uvx -p ${{ matrix.python-version }} --with tox-uv tox -e doctests
      - name: Upload coverage report to codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        if: success()
        with:
          file: coverage.xml
