# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

sphinx:
  # Path to your Sphinx configuration file, required as of
  # https://about.readthedocs.com/blog/2024/12/deprecate-config-files-without-sphinx-or-mkdocs-config/
  configuration: docs/source/conf.py

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  apt_packages:
    - graphviz
  tools:
    python: "3.12"

  # adapted from uv recipe at https://docs.readthedocs.io/en/stable/build-customization.html#install-dependencies-with-uv
  # and comment at https://github.com/readthedocs/readthedocs.org/issues/11289#issuecomment-2103832834
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    # Clone the fork dependencies that [tool.uv.sources] points at as sibling
    # checkouts (mirrors the clone step in .github/workflows/tests.yml — keep
    # the two lists in sync, and drop entries as forks merge upstream).
    - git clone --depth 1 https://github.com/elinscott/aiida-koopmans ../aiida-koopmans2
    - git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
    - git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
    - git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
    - git clone --depth 1 --branch patched https://github.com/elinscott/aiida-quantumespresso ../aiida-quantumespresso
    - git clone --depth 1 --branch using_updated_xml https://github.com/elinscott/wannier90-input ../wannier90-input
    - git clone --depth 1 https://github.com/elinscott/pydantic-espresso ../pydantic_espresso
    - git init -q ../aiida-core && git -C ../aiida-core fetch --depth 1 https://github.com/aiidateam/aiida-core 9acc05b4c792bdf321a3d4a8a41db3b1146d54c6 && git -C ../aiida-core checkout -q FETCH_HEAD
    - uv venv $READTHEDOCS_VIRTUALENV_PATH
    - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH uv pip install --group docs .
    - python -m sphinx -T -b html -d docs/_build/doctrees -D language=en docs/source $READTHEDOCS_OUTPUT/html
